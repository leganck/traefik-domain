version: "3.8"

services:
  traefik-domain:
    image: leganck/traefik-domain:latest
    container_name: traefik-domain
    restart: unless-stopped
    environment:
      - TRAEFIK_HOST=http://traefik:8080
      - POLL_INTERVAL=5
      - LOG_LEVEL=info
      - DNS_NAME=dnspod
      - DNS_ID=your_dns_id
      - DNS_SECRET=your_dns_secret
      - DNS_RECORD_VALUE=192.168.1.1
      - DNS_REFRESH=false
